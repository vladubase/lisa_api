services:
  # LISA FastAPI Backend
  lisa-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lisa_api_core
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - MQTT_BROKER_URL=mqtt-broker
      - MQTT_BROKER_PORT=1883
    volumes:
      # Mount source code for hot-reloading during development
      - ./src:/app/src
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - mqtt-broker
    

  # MQTT Broker for VDA 5050 communication
  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: lisa_mqtt_broker
    ports:
      - "1883:1883" # MQTT port
      - "9001:9001" # WebSockets over MQTT
    volumes:
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

volumes:
  mosquitto-data:
  mosquitto-log: